databases:
  - name: siia_db
    databaseName: siia
    user: siia_user

services:
  - type: web
    name: siia-backend
    env: python
    buildCommand: "pip install -r server/requirements.txt"
    startCommand: "cd server && flask db upgrade && gunicorn run:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: siia_db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://siia-frontend.onrender.com # Update with actual frontend URL after deployment
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/google-credentials.json # Render Secret File path

  - type: web
    name: siia-frontend
    env: static
    region: frankfurt # Choose your preferred region
    buildCommand: "cd client && npm install && npm run build"
    staticPublishPath: "./client/dist"
    envVars:
      - key: VITE_API_URL
        value: https://siia-backend.onrender.com # Update with actual backend URL after deployment
    # Fallback to index.html for React Router
    routes:
      - type: rewrite
        source: /*
        destination: /index.html